<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Turquoise House outline -->
  <path d="M 70 360 L 70 520 L 310 520 L 310 360 L 380 360 L 380 300 L 450 300 L 450 360 L 620 360 L 620 520 L 860 520 L 860 360"
        fill="none" stroke="#17B8A4" stroke-width="50" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Happy child illustration -->
  <g transform="translate(680, 280)">
    <!-- Head -->
    <circle cx="0" cy="0" r="45" fill="#FFD700"/>

    <!-- Hair -->
    <path d="M -40 -40 Q -50 -50 -45 -65 Q -30 -75 -10 -75 Q 20 -75 40 -65 Q 50 -50 40 -40"
          fill="#2C2C2C" stroke="#000" stroke-width="2"/>

    <!-- Face details -->
    <circle cx="-15" cy="-8" r="8" fill="#FF69B4"/>
    <circle cx="15" cy="-8" r="8" fill="#FF69B4"/>

    <!-- Eyes -->
    <circle cx="-15" cy="-10" r="5" fill="#000"/>
    <circle cx="15" cy="-10" r="5" fill="#000"/>
    <circle cx="-13" cy="-12" r="2" fill="#FFF"/>
    <circle cx="17" cy="-12" r="2" fill="#FFF"/>

    <!-- Smile -->
    <path d="M -10 8 Q 0 18 10 8" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Body (Yellow shirt) -->
    <ellipse cx="0" cy="50" rx="35" ry="45" fill="#FFD700"/>

    <!-- Arms -->
    <ellipse cx="-50" cy="40" rx="20" ry="35" fill="#FFD700" transform="rotate(-35 -50 40)"/>
    <ellipse cx="50" cy="40" rx="20" ry="35" fill="#FFD700" transform="rotate(35 50 40)"/>

    <!-- Hands -->
    <circle cx="-70" cy="0" r="18" fill="#FFD700"/>
    <circle cx="70" cy="0" r="18" fill="#FFD700"/>

    <!-- Hula hoop (Purple) -->
    <ellipse cx="0" cy="60" rx="70" ry="45" fill="none" stroke="#9B4D96" stroke-width="12"/>

    <!-- Hula hoop details -->
    <circle cx="-50" cy="65" r="8" fill="#9B4D96" opacity="0.7"/>
    <circle cx="0" cy="75" r="8" fill="#9B4D96" opacity="0.7"/>
    <circle cx="50" cy="65" r="8" fill="#9B4D96" opacity="0.7"/>
  </g>

  <!-- "Aashiyan" text -->
  <text x="300" y="480" font-family="Arial Black, sans-serif" font-size="120" font-weight="bold" fill="#9B4D96"
        letter-spacing="2" stroke="#000" stroke-width="3">Aashiyan</text>

  <!-- Subtitle -->
  <text x="300" y="530" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#000"
        letter-spacing="1">BY THE SHE SAGA FOUNDATION</text>
</svg>
